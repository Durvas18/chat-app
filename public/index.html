<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #00e5a0;
      --accent-dim: rgba(0,229,160,0.1);
      --text: #e8e8e8;
      --muted: #666;
      --system: #555;
      --danger: #ff4d4d;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── JOIN SCREEN ── */
    #join-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      animation: fadeIn .4s ease;
    }
    #join-screen h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 2rem;
      letter-spacing: -1px;
    }
    #join-screen h1 span { color: var(--accent); }
    #join-screen input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1rem;
      padding: 12px 18px;
      border-radius: 6px;
      width: 280px;
      outline: none;
      transition: border-color .2s;
    }
    #join-screen input:focus { border-color: var(--accent); }
    #join-screen button {
      background: var(--accent);
      color: #000;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
      font-size: .9rem;
      border: none;
      padding: 12px 32px;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: .5px;
      transition: opacity .15s;
    }
    #join-screen button:hover { opacity: .85; }

    /* ── CHAT SCREEN ── */
    #chat-screen {
      display: none;
      flex-direction: column;
      width: 100%;
      max-width: 700px;
      height: 100dvh;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    header .title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: .95rem;
      font-weight: 600;
      color: var(--accent);
    }
    #user-count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: .78rem;
      color: var(--muted);
    }
    #user-count::before { content: '⬤ '; color: var(--accent); font-size: .5rem; vertical-align: middle; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .msg { animation: slideIn .2s ease; }

    .msg-bubble {
      display: inline-flex;
      flex-direction: column;
      max-width: 75%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
    }
    .msg.own { align-items: flex-end; align-self: flex-end; }
    .msg.own .msg-bubble {
      background: var(--accent-dim);
      border-color: rgba(0,229,160,0.25);
    }
    .msg-header {
      display: flex;
      gap: 8px;
      align-items: baseline;
      margin-bottom: 4px;
    }
    .msg-user {
      font-family: 'IBM Plex Mono', monospace;
      font-size: .72rem;
      font-weight: 600;
      color: var(--accent);
    }
    .msg-time {
      font-size: .68rem;
      color: var(--muted);
    }
    .msg-text { font-size: .9rem; line-height: 1.5; word-break: break-word; }

    .system-msg {
      text-align: center;
      font-size: .72rem;
      color: var(--system);
      font-family: 'IBM Plex Mono', monospace;
      margin: 6px 0;
    }

    #typing-indicator {
      min-height: 20px;
      padding: 0 20px;
      font-size: .75rem;
      color: var(--muted);
      font-style: italic;
    }

    footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 10px;
    }
    footer input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: .9rem;
      padding: 10px 14px;
      border-radius: 6px;
      outline: none;
      transition: border-color .2s;
    }
    footer input:focus { border-color: var(--accent); }
    footer button {
      background: var(--accent);
      color: #000;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
      font-size: .85rem;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity .15s;
    }
    footer button:hover { opacity: .85; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>

<!-- Join Screen -->
<div id="join-screen">
  <h1>live<span>chat</span></h1>
  <input id="username-input" type="text" placeholder="Enter your username" maxlength="20" autocomplete="off"/>
  <button onclick="joinChat()">Join →</button>
</div>

<!-- Chat Screen -->
<div id="chat-screen">
  <header>
    <span class="title"># general</span>
    <span id="user-count">0 online</span>
  </header>
  <div id="messages"></div>
  <div id="typing-indicator"></div>
  <footer>
    <input id="msg-input" type="text" placeholder="Type a message..." maxlength="300" autocomplete="off"/>
    <button onclick="sendMessage()">Send</button>
  </footer>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let myUsername = '';
  let typingTimeout;

  function joinChat() {
    const input = document.getElementById('username-input');
    const name = input.value.trim();
    if (!name) return input.focus();
    myUsername = name;
    socket.emit('join', name);
    document.getElementById('join-screen').style.display = 'none';
    document.getElementById('chat-screen').style.display = 'flex';
    document.getElementById('msg-input').focus();
  }

  document.getElementById('username-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinChat();
  });

  document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMessage();
    socket.emit('typing');
  });

  function sendMessage() {
    const input = document.getElementById('msg-input');
    const msg = input.value.trim();
    if (!msg) return;
    socket.emit('chat_message', msg);
    input.value = '';
  }

  socket.on('chat_message', ({ username, msg, time }) => {
    const messages = document.getElementById('messages');
    const isOwn = username === myUsername;
    const div = document.createElement('div');
    div.className = `msg${isOwn ? ' own' : ''}`;
    div.innerHTML = `
      <div class="msg-bubble">
        <div class="msg-header">
          <span class="msg-user">${escapeHtml(username)}</span>
          <span class="msg-time">${time}</span>
        </div>
        <div class="msg-text">${escapeHtml(msg)}</div>
      </div>`;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  });

  socket.on('system', (text) => {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'system-msg';
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  });

  socket.on('user_count', (count) => {
    document.getElementById('user-count').textContent = `${count} online`;
  });

  socket.on('typing', (username) => {
    const el = document.getElementById('typing-indicator');
    el.textContent = `${username} is typing...`;
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => el.textContent = '', 1500);
  });

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
